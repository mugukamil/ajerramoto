<svg width="446" height="286" viewBox="0 0 446 286" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Confetti and celebration elements -->
  <rect x="40" y="60" width="8" height="8" rx="2" fill="#FEB05D" opacity="0.8"/>
  <rect x="380" y="40" width="6" height="6" rx="1" fill="#FEB05D" opacity="0.6"/>
  <rect x="60" y="180" width="10" height="10" rx="2" fill="#FEB05D" opacity="0.5"/>
  <rect x="400" y="150" width="8" height="8" rx="2" fill="#FEB05D" opacity="0.7"/>

  <!-- Circles -->
  <circle cx="90" cy="100" r="5" fill="#FEB05D" opacity="0.4"/>
  <circle cx="350" cy="80" r="4" fill="#FEB05D" opacity="0.5"/>
  <circle cx="70" cy="220" r="6" fill="#FEB05D" opacity="0.3"/>
  <circle cx="380" cy="200" r="5" fill="#FEB05D" opacity="0.4"/>

  <!-- Scooter/motorcycle simplified -->
  <g transform="translate(120, 80)">
    <!-- Body -->
    <path d="M60 80 L180 80 L200 100 L200 120 L40 120 L40 100 Z" fill="#242424"/>
    <!-- Wheels -->
    <circle cx="80" cy="120" r="30" fill="#444" stroke="#666" stroke-width="4"/>
    <circle cx="80" cy="120" r="15" fill="#333"/>
    <circle cx="180" cy="120" r="30" fill="#444" stroke="#666" stroke-width="4"/>
    <circle cx="180" cy="120" r="15" fill="#333"/>
    <!-- Handle -->
    <rect x="170" y="40" width="8" height="50" rx="4" fill="#444"/>
    <rect x="160" y="35" width="30" height="12" rx="4" fill="#555"/>
    <!-- Seat -->
    <ellipse cx="120" cy="70" rx="40" ry="15" fill="#333"/>
    <!-- Headlight -->
    <circle cx="200" cy="90" r="12" fill="#FEB05D" opacity="0.8"/>
  </g>

  <!-- Checkmark in circle -->
  <g transform="translate(180, 200)">
    <circle cx="40" cy="40" r="35" fill="#FEB05D"/>
    <path d="M25 40 L35 50 L55 30" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Decorative lines -->
  <line x1="30" y1="140" x2="50" y2="160" stroke="#FEB05D" stroke-width="2" opacity="0.5"/>
  <line x1="400" y1="120" x2="420" y2="100" stroke="#FEB05D" stroke-width="2" opacity="0.5"/>

  <!-- Stars -->
  <polygon points="100,50 103,58 112,58 105,63 108,72 100,67 92,72 95,63 88,58 97,58" fill="#FEB05D" opacity="0.6"/>
  <polygon points="360,180 362,186 369,186 364,190 366,196 360,192 354,196 356,190 351,186 358,186" fill="#FEB05D" opacity="0.5"/>
</svg>
